services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fincard
      POSTGRES_PASSWORD: fincard
      POSTGRES_DB: fincard
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fincard"]
      interval: 5s
      timeout: 3s
      retries: 10
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEBUG: "0"
    ports: ["4566:4566"]
    volumes:
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
